name: Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - jwt/v[0-9]+.[0-9]+.[0-9]+
      - oidc/v[0-9]+.[0-9]+.[0-9]+
      - authotel/v[0-9]+.[0-9]+.[0-9]+

permissions:
  contents: write

env:
  GOFLAGS: -mod=readonly

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: |
            go.sum
            jwt/go.sum
            oidc/go.sum
            authotel/go.sum
      - name: Verify annotated tag
        run: test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
      - name: Derive semantic version
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_ENV"
      - name: Verify changelog section
        run: ./scripts/release-notes.sh "$VERSION" > release-notes.md
      - run: ./scripts/check-all.sh
      - name: Vulnerability scan
        run: |
          for module in . jwt oidc authotel; do
            (cd "$module" && go run golang.org/x/vuln/cmd/govulncheck@latest ./...)
          done
      - name: Build reproducible archives
        run: |
          ./scripts/build-release.sh "$VERSION" "$GITHUB_REF_NAME"
          cp "dist/go-authentication-${VERSION}.tar.gz" /tmp/first.tar.gz
          rm -rf dist
          ./scripts/build-release.sh "$VERSION" "$GITHUB_REF_NAME"
          cmp /tmp/first.tar.gz "dist/go-authentication-${VERSION}.tar.gz"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/*
          --verify-tag
          --title "$GITHUB_REF_NAME"
          --notes-file release-notes.md
